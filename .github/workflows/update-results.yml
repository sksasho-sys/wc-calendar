name: Daily World Cup results update

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save

      - name: Fetch latest results and patch data.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-results.mjs

      - name: Show data.ts content right after patch (debug)
        run: |
          echo "--- grep for Brazil/Japan, Germany/Paraguay, Netherlands/Morocco right after patch ---"
          grep -n "Brazil', away: 'Japan'" src/data.ts || true
          grep -n "Germany', away: 'Paraguay'" src/data.ts || true
          grep -n "Netherlands', away: 'Morocco'" src/data.ts || true

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- src/data.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Clear any Vite cache and old build output
        if: steps.diff.outputs.changed == 'true'
        run: |
          rm -rf node_modules/.vite
          rm -rf dist
          rm -f bundle.html

      - name: Build static site
        if: steps.diff.outputs.changed == 'true'
        run: npx vite build --force

      - name: Show dist bundle content (debug)
        if: steps.diff.outputs.changed == 'true'
        run: |
          echo "--- grep built JS for Brazil/Japan result ---"
          grep -o "Brazil[^}]*Japan[^}]*}" dist/assets/*.js || true

      - name: Inline JS/CSS into a single self-contained HTML file
        if: steps.diff.outputs.changed == 'true'
        run: |
          npx html-inline dist/index.html -o bundle.html
          echo "--- bundle.html size ---"
          wc -c bundle.html
          if grep -q '<script[^>]*src=' bundle.html; then
            echo "ERROR: bundle.html still references an external script — inlining failed."
            exit 1
          fi
          echo "--- grep bundle.html for Brazil/Japan result (final check) ---"
          grep -o "Brazil[^}]*Japan[^}]*}" bundle.html || true

      - name: Replace index.html with rebuilt bundle
        if: steps.diff.outputs.changed == 'true'
        run: cp bundle.html index.html

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data.ts index.html
          git commit -m "Auto-update World Cup results"
          git push
