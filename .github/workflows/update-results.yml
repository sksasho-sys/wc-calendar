name: Daily World Cup results update

on:
  schedule:
    # Runs at minute 17 of every hour (offset off :00 to dodge GitHub's
    # busiest cron slot). Temporary hourly schedule to verify the cron
    # fires at all — switch back to a single daily run once confirmed,
    # e.g.  - cron: '17 5 * * *'  (05:17 UTC = 08:17 Sofia time).
    - cron: '17 * * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Fetch latest results and patch index.html directly
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-results.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- index.html; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add index.html
          git commit -m "Auto-update World Cup results"
          git push
