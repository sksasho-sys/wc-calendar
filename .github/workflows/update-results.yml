name: Daily World Cup results update

on:
  schedule:
    - cron: '0 5 * * *'
  workflow_dispatch: {}

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm install --no-save

      - name: Fetch latest results and patch data.ts
        env:
          FOOTBALL_DATA_API_KEY: ${{ secrets.FOOTBALL_DATA_API_KEY }}
        run: node scripts/update-results.mjs

      - name: Check for changes
        id: diff
        run: |
          if git diff --quiet -- src/data.ts; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Build in a fresh, isolated copy of the repo
        if: steps.diff.outputs.changed == 'true'
        run: |
          # Copy the entire working tree (with the freshly patched data.ts) into a
          # brand-new directory. This sidesteps any stale in-memory or on-disk
          # caching Vite/Node may be holding onto from this runner process,
          # since the build now happens against files it has never seen before.
          rm -rf /tmp/freshbuild
          mkdir -p /tmp/freshbuild
          cp -r . /tmp/freshbuild
          cd /tmp/freshbuild
          rm -rf node_modules/.vite node_modules/.cache dist bundle.html
          node_modules/.bin/vite build
          npx html-inline dist/index.html -o bundle.html
          echo "--- bundle.html size ---"
          wc -c bundle.html
          if grep -q '<script[^>]*src=' bundle.html; then
            echo "ERROR: bundle.html still references an external script — inlining failed."
            exit 1
          fi
          echo "--- grep bundle.html for Brazil/Japan result (final check) ---"
          grep -o "Brazil[^}]*Japan[^}]*}" bundle.html || true
          # Copy the final bundle back to the original working directory
          cp bundle.html "$GITHUB_WORKSPACE/bundle.html"

      - name: Replace index.html with rebuilt bundle
        if: steps.diff.outputs.changed == 'true'
        run: cp bundle.html index.html

      - name: Commit and push
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name "wc2026-bot"
          git config user.email "actions@users.noreply.github.com"
          git add src/data.ts index.html
          git commit -m "Auto-update World Cup results"
          git push
